<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>פִּנְקָס — ניהול קבלות</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
:root{
  --ink:#16160F; --paper:#F6F5F0; --card:#FCFBF7; --green:#1C6B47;
  --green-soft:#E4EFE7; --stamp:#B23A2E; --line:#D9D6CC; --muted:#6E6B60;
  --sans:"Assistant",system-ui,sans-serif; --mono:"JetBrains Mono",ui-monospace,monospace;
}
*{box-sizing:border-box} html,body{margin:0;padding:0}
body{background:var(--paper);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased;line-height:1.45}
.wrap{max-width:800px;margin:0 auto;padding:18px 16px 80px}

/* api key banner */
.key-bar{background:var(--ink);color:#fff;border-radius:12px;padding:14px 18px;
  margin-bottom:18px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.key-bar label{font-size:13px;color:#aaa;white-space:nowrap}
.key-bar input{flex:1;min-width:200px;font-family:var(--mono);font-size:13px;
  background:#2a2a20;color:#fff;border:1px solid #3a3a30;border-radius:7px;
  padding:7px 10px}
.key-bar input:focus{outline:none;border-color:var(--green)}
.key-bar .save{font-size:13px;font-weight:700;cursor:pointer;
  background:var(--green);border:none;color:#fff;padding:8px 14px;border-radius:7px}
.key-status{font-size:12px;font-family:var(--mono);white-space:nowrap}
.key-status.ok{color:#9be0bb} .key-status.no{color:#f9a8a8}

header{display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin-bottom:16px}
.brand h1{font-family:var(--mono);font-weight:700;font-size:26px;letter-spacing:1px;margin:0}
.brand .dot{color:var(--green)} .brand small{font-size:12.5px;color:var(--muted)}
.brand{display:flex;align-items:baseline;gap:10px}
.btn{font-family:var(--sans);font-weight:600;font-size:14px;cursor:pointer;
  border:1px solid var(--line);background:var(--card);color:var(--ink);
  padding:8px 14px;border-radius:9px;transition:.15s}
.btn:hover{border-color:var(--ink)} .btn:disabled{opacity:.45;cursor:default}
.btn-green{background:var(--green);color:#fff;border-color:var(--green)}
.btn-green:hover{background:#175438}

.tally{position:relative;background:var(--ink);color:var(--paper);
  border-radius:12px;padding:18px 20px 20px;margin-bottom:22px;
  box-shadow:0 8px 24px -16px rgba(0,0,0,.5)}
.tally::before,.tally::after{content:"";position:absolute;left:0;right:0;height:8px;
  background-image:radial-gradient(circle at 6px 4px,var(--paper) 4px,transparent 4.5px);
  background-size:12px 8px;background-repeat:repeat-x}
.tally::before{top:-4px} .tally::after{bottom:-4px}
.tally .row{display:flex;justify-content:space-between;align-items:baseline;
  font-family:var(--mono);font-size:13px;color:#cfccc0;padding:3px 0}
.tally .row .v{color:var(--paper)}
.tally .grand{border-top:1px dashed #4a473d;margin-top:8px;padding-top:10px;
  display:flex;justify-content:space-between;align-items:flex-end}
.tally .grand .lbl{font-size:13px;color:#cfccc0}
.tally .grand .amt{font-family:var(--mono);font-weight:700;font-size:30px;color:#fff}
.tally .grand .amt .cur{font-size:16px;color:#9be0bb;margin-inline-start:4px}

.drop{border:1.5px dashed var(--line);border-radius:12px;background:var(--card);
  padding:26px 18px;text-align:center;transition:.18s;cursor:pointer;margin-bottom:14px}
.drop:hover,.drop.drag{border-color:var(--green);background:var(--green-soft)}
.drop .ico{font-size:26px;display:block;margin-bottom:8px}
.drop .big{font-weight:700;font-size:16px;margin-bottom:4px}
.drop .sub{font-size:13px;color:var(--muted)}
#file{display:none}

/* progress */
.progress-bar{height:3px;background:var(--line);border-radius:2px;margin-bottom:14px;overflow:hidden;display:none}
.progress-bar.show{display:block}
.progress-fill{height:100%;background:var(--green);transition:width .3s;width:0}
.progress-label{font-size:12px;color:var(--muted);text-align:center;margin-top:3px;font-family:var(--mono)}

.filters{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:18px 0 8px}
.search{flex:1;min-width:160px}
.search input{width:100%;font-family:var(--sans);font-size:14px;padding:9px 12px;
  border-radius:9px;border:1px solid var(--line);background:var(--card);color:var(--ink)}
.search input:focus{outline:none;border-color:var(--ink)}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.chip{font-size:12.5px;font-weight:600;padding:6px 11px;border-radius:20px;cursor:pointer;
  border:1px solid var(--line);background:var(--card);color:var(--muted);transition:.12s;white-space:nowrap}
.chip:hover{border-color:var(--ink);color:var(--ink)} .chip.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}

.list{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden}
.item{border-bottom:1px dashed var(--line)} .item:last-child{border-bottom:none}
.item-head{display:flex;align-items:center;gap:12px;padding:13px 15px;cursor:pointer}
.item-head:hover{background:#f3f1ea}
.thumb{width:40px;height:50px;border-radius:5px;object-fit:cover;background:#eee;border:1px solid var(--line);flex-shrink:0}
.thumb.ph{display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--muted)}
.meta{flex:1;min-width:0}
.meta .v{font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.meta .d{font-size:12.5px;color:var(--muted);font-family:var(--mono)}
.cat{font-size:11px;font-weight:600;color:var(--green);background:var(--green-soft);
  padding:2px 8px;border-radius:12px;display:inline-block;margin-top:3px}
.amt-col{text-align:end;flex-shrink:0}
.amt-col .t{font-family:var(--mono);font-weight:700;font-size:16px}
.amt-col .vat{font-family:var(--mono);font-size:11px;color:var(--muted)}
.spin{width:16px;height:16px;border:2px solid var(--line);border-top-color:var(--green);
  border-radius:50%;animation:sp .7s linear infinite;display:inline-block}
@keyframes sp{to{transform:rotate(360deg)}}

.detail{padding:0 15px 16px;background:#f3f1ea}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding-top:14px}
.fld{display:flex;flex-direction:column;gap:3px}
.fld label{font-size:11px;color:var(--muted);font-weight:600}
.fld input,.fld select{font-family:var(--sans);font-size:14px;padding:7px 9px;
  border:1px solid var(--line);border-radius:7px;background:var(--card);color:var(--ink)}
.fld input:focus,.fld select:focus{outline:none;border-color:var(--ink)}
.fld.mono input{font-family:var(--mono)}
.actions{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.btn-ghost{background:transparent;border:none;color:var(--stamp);font-weight:600;
  cursor:pointer;font-size:13.5px;padding:8px 4px}
.btn-sm{padding:7px 12px;font-size:13px}

.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty .e-ico{font-size:34px;margin-bottom:10px}
.empty .e-t{font-weight:700;color:var(--ink);font-size:16px;margin-bottom:4px}

.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);
  background:var(--ink);color:var(--paper);padding:11px 18px;border-radius:10px;
  font-size:13.5px;font-weight:600;opacity:0;transition:.25s;pointer-events:none;z-index:50;max-width:90vw}
.toast.show{opacity:1}
.foot{text-align:center;font-size:11.5px;color:var(--muted);margin-top:18px;font-family:var(--mono)}
</style>
</head>
<body>
<div class="wrap">

  <!-- API Key Banner -->
  <div class="key-bar">
    <label>🔑 OpenRouter API Key</label>
    <input type="password" id="apiKeyInput" placeholder="sk-or-v1-..." autocomplete="off" />
    <button class="save" id="saveKey">שמור</button>
    <span class="key-status" id="keyStatus"></span>
  </div>

  <header>
    <div class="brand">
      <h1>פִּנְקָס<span class="dot">.</span></h1>
      <small>מהקבלה לדוח — אוטומטית</small>
    </div>
    <button class="btn" id="exportBtn">ייצוא CSV</button>
  </header>

  <div class="tally" id="tally"></div>

  <div class="drop" id="drop">
    <span class="ico">🧾</span>
    <div class="big">גררו קבלה לכאן, צלמו או בחרו קובץ</div>
    <div class="sub">תמונה (JPG, PNG, HEIC) או PDF — ה-AI יקרא את כל הפרטים</div>
  </div>
  <input type="file" id="file" accept="image/*,application/pdf" multiple />

  <div class="progress-bar" id="progressBar">
    <div class="progress-fill" id="progressFill"></div>
  </div>
  <div class="progress-label" id="progressLabel"></div>

  <div class="filters">
    <div class="search"><input id="search" placeholder="חיפוש לפי ספק…" /></div>
  </div>
  <div class="chips" id="chips"></div>
  <div id="listArea"></div>

  <div class="foot">פִּנְקָס · הנתונים נשמרים מקומית בדפדפן · API key נשמר רק בדפדפן שלך · חינמי לגמרי</div>
</div>
<div class="toast" id="toast"></div>

<script>
const CATEGORIES = ["מזון ומסעדות","דלק ותחבורה","ציוד ומשרד","תוכנה ומנויים","אירוח ולינה","שיווק ופרסום","שירותים מקצועיים","אחר"];
const STORAGE_KEY = "pinkas_v2";
const API_KEY_STORE = "pinkas_apikey";

let receipts = [];
let filterCat = null;
let searchText = "";
let expandedId = null;
let editingId = null;
let apiKey = "";

/* ---------- API key ---------- */
function loadKey(){
  apiKey = localStorage.getItem(API_KEY_STORE) || "";
  const inp = document.getElementById('apiKeyInput');
  inp.value = apiKey ? "sk-ant-••••••••" : "";
  updateKeyStatus();
}
function saveKey(){
  const val = document.getElementById('apiKeyInput').value.trim();
  if(val && !val.startsWith("sk-ant-•")){
    apiKey = val;
    localStorage.setItem(API_KEY_STORE, val);
  }
  updateKeyStatus();
  toast("🔑 API key נשמר");
}
function updateKeyStatus(){
  const el = document.getElementById('keyStatus');
  if(apiKey){ el.textContent="✓ מחובר"; el.className="key-status ok"; }
  else{ el.textContent="לא הוגדר"; el.className="key-status no"; }
}
document.getElementById('saveKey').onclick = saveKey;
document.getElementById('apiKeyInput').addEventListener('keydown', e => { if(e.key==='Enter') saveKey(); });

/* ---------- helpers ---------- */
const uid = () => Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const esc = s => (s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
function money(n,cur){
  if(n==null||isNaN(n)) return "—";
  try{ return new Intl.NumberFormat('he-IL',{style:'currency',currency:cur||'ILS',maximumFractionDigits:2}).format(n); }
  catch(e){ return (cur||'₪')+" "+Number(n).toFixed(2); }
}
function toast(msg,dur=2400){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove('show'),dur);
}
function setProgress(pct, label){
  const bar=document.getElementById('progressBar');
  const fill=document.getElementById('progressFill');
  const lbl=document.getElementById('progressLabel');
  if(pct===null){ bar.classList.remove('show'); lbl.textContent=""; return; }
  bar.classList.add('show');
  fill.style.width=pct+"%";
  lbl.textContent=label||"";
}

/* ---------- storage ---------- */
function persist(){ try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(receipts)); }catch(e){} }
function loadData(){ try{ return JSON.parse(localStorage.getItem(STORAGE_KEY)||"[]"); }catch(e){ return []; } }

/* ---------- file helpers ---------- */
function fileToBase64(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result.split(",")[1]);
    r.onerror=()=>rej(new Error("read failed"));
    r.readAsDataURL(file);
  });
}
function makeThumb(file){
  return new Promise(res=>{
    if(file.type==="application/pdf"){ res(null); return; }
    const img=new Image(), url=URL.createObjectURL(file);
    img.onload=()=>{
      const maxW=150, s=Math.min(1,maxW/img.width);
      const c=document.createElement('canvas');
      c.width=img.width*s; c.height=img.height*s;
      c.getContext('2d').drawImage(img,0,0,c.width,c.height);
      URL.revokeObjectURL(url); res(c.toDataURL('image/jpeg',0.5));
    };
    img.onerror=()=>{ URL.revokeObjectURL(url); res(null); };
    img.src=url;
  });
}

/* ---------- PDF text extraction ---------- */
async function extractPdfText(b64){
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
  const bytes = Uint8Array.from(atob(b64), c=>c.charCodeAt(0));
  const doc = await pdfjsLib.getDocument({data:bytes}).promise;
  let text = "";
  for(let i=1; i<=Math.min(doc.numPages,4); i++){
    const page = await doc.getPage(i);
    const content = await page.getTextContent();
    text += content.items.map(it=>it.str).join(" ") + "\n";
  }
  return text.trim();
}

/* ---------- Image OCR via Tesseract ---------- */
async function ocrImage(dataUrl){
  setProgress(40, "מריץ OCR…");
  // Dynamically load tesseract only when needed
  if(typeof Tesseract === "undefined"){
    await new Promise((res,rej)=>{
      const s=document.createElement('script');
      s.src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js";
      s.onload=res; s.onerror=()=>rej(new Error("Tesseract failed to load"));
      document.head.appendChild(s);
    });
  }
  const result = await Tesseract.recognize(dataUrl, ["heb","eng"], {
    logger: m => { if(m.status==="recognizing text") setProgress(40+m.progress*30,"OCR "+Math.round(m.progress*100)+"%"); }
  });
  return result.data.text || "";
}

/* ---------- Claude API call ---------- */
async function extractFromText(rawText){
  if(!apiKey) throw new Error("הכניסו OpenRouter API key כדי להשתמש בשירות");
  setProgress(75, "שולח ל-OpenRouter…");
  const cats = CATEGORIES.join("|");
  const prompt = [
    "Text extracted from a receipt or invoice (may be Hebrew or English).",
    "Return ONLY a valid minified JSON object with this schema:",
    `{"vendor":string,"date":"YYYY-MM-DD or null","category":"one of: ${cats}","currency":"ILS|USD|EUR","subtotal":number_or_null,"vat":number_or_null,"total":number_or_null,"payment_method":string_or_null,"confidence":0.0_to_1.0}`,
    "Rules: amounts are plain numbers without symbols. Unknown → null. Output ONLY the JSON.",
    "",
    "RECEIPT TEXT:",
    rawText.slice(0, 5000)
  ].join("\n");

  const resp = await fetch("https://openrouter.ai/api/v1/chat/completions", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": `Bearer ${apiKey}`
    },
    body: JSON.stringify({
      model: "google/gemini-2.0-flash-exp:free",
      messages: [{ role: "user", content: prompt }],
      temperature: 0.1,
      max_tokens: 1000
    })
  });

  const text = await resp.text();
  let data;
  try{ data = JSON.parse(text); }
  catch(e){ throw new Error("שגיאת שרת: " + text.slice(0,100)); }
  if(!resp.ok || data.error) throw new Error(data?.error?.message || "HTTP " + resp.status);
  const raw = data?.choices?.[0]?.message?.content || "";
  const match = raw.match(/\{[\s\S]*\}/);
  if(!match) throw new Error("תשובה לא תקינה: " + raw.slice(0,80));
  return JSON.parse(match[0]);
}

/* ---------- main extraction pipeline ---------- */
async function extractReceipt(b64, rawMediaType, file){
  const isPdf = (rawMediaType||"").toLowerCase() === "application/pdf";
  let extractedText = "";

  if(isPdf){
    setProgress(20, "מחלץ טקסט מ-PDF…");
    extractedText = await extractPdfText(b64);
    if(!extractedText.trim()) throw new Error("לא נמצא טקסט ב-PDF (ייתכן שהוא סרוק — נסו תמונה)");
  } else {
    setProgress(20, "מעבד תמונה…");
    // Render to canvas for OCR
    const dataUrl = await new Promise((res,rej)=>{
      const img=new Image();
      img.onload=()=>{
        const MAX=1600, s=Math.min(1,MAX/Math.max(img.width,img.height));
        const c=document.createElement("canvas");
        c.width=Math.round(img.width*s); c.height=Math.round(img.height*s);
        c.getContext("2d").drawImage(img,0,0,c.width,c.height);
        res(c.toDataURL("image/png"));
      };
      img.onerror=()=>rej(new Error("טעינת תמונה נכשלה"));
      img.src = "data:"+(rawMediaType||"image/jpeg")+";base64,"+b64;
    });
    extractedText = await ocrImage(dataUrl);
    if(!extractedText.trim()) throw new Error("OCR לא הצליח לחלץ טקסט — נסו תמונה ברורה יותר");
  }

  console.log("[פנקס] extracted text:", extractedText.slice(0,400));
  return await extractFromText(extractedText);
}

/* ---------- ingest ---------- */
async function handleFiles(files){
  for(const file of files){
    const id = uid();
    const thumb = await makeThumb(file);
    const rec = {id, status:"processing", vendor:"מעבד…", date:null, category:null,
                 currency:"ILS", subtotal:null, vat:null, total:null,
                 payment_method:null, thumb, createdAt:Date.now()};
    receipts.unshift(rec);
    render();
    try{
      setProgress(10, "קורא קובץ…");
      const b64 = await fileToBase64(file);
      const out = await extractReceipt(b64, file.type, file);
      Object.assign(rec,{
        status:"done",
        vendor: out.vendor || "ספק לא מזוהה",
        date: out.date || null,
        category: CATEGORIES.includes(out.category) ? out.category : "אחר",
        currency: out.currency || "ILS",
        subtotal: numOrNull(out.subtotal),
        vat: numOrNull(out.vat),
        total: numOrNull(out.total),
        payment_method: out.payment_method || null,
        confidence: out.confidence
      });
      toast("✓ " + (rec.vendor||"קבלה") + " נקלטה");
    } catch(e){
      console.error("[פנקס]", e);
      Object.assign(rec,{status:"error", vendor:"לא זוהה — ערכו ידנית", category:"אחר", _err:e.message});
      toast("❌ " + (e.message||"שגיאת חילוץ").slice(0,70));
    }
    setProgress(null);
    persist(); render();
  }
}
const numOrNull = v => (v==null||v===""||isNaN(Number(v))) ? null : Number(v);

/* ---------- rendering ---------- */
function filtered(){
  return receipts.filter(r=>{
    if(filterCat && r.category!==filterCat) return false;
    if(searchText && !(r.vendor||"").toLowerCase().includes(searchText.toLowerCase())) return false;
    return true;
  });
}
function renderTally(){
  const done = receipts.filter(r=>r.status!=="processing");
  const sums={}; let vatTotal=0;
  done.forEach(r=>{ const c=r.currency||'ILS'; if(r.total){ sums[c]=(sums[c]||0)+r.total; } if(r.vat&&c==='ILS') vatTotal+=r.vat; });
  const currencies=Object.keys(sums);
  const main=currencies[0]||'ILS';
  document.getElementById('tally').innerHTML =
    `<div class="row"><span>קבלות שנקלטו</span><span class="v">${receipts.length}</span></div>`+
    `<div class="row"><span>סך מע״מ (₪)</span><span class="v">${vatTotal?vatTotal.toFixed(2):"0.00"}</span></div>`+
    (currencies.slice(1).map(c=>`<div class="row"><span>סה״כ ${c}</span><span class="v">${money(sums[c],c)}</span></div>`).join(""))+
    `<div class="grand"><span class="lbl">סך ההוצאות</span>`+
    `<span class="amt">${money(sums[main]||0,main).replace(/[^\d.,\s]/g,'').trim()}<span class="cur">${main==='ILS'?'₪':main}</span></span></div>`;
}
function renderChips(){
  const el=document.getElementById('chips');
  el.innerHTML=`<span class="chip ${!filterCat?'on':''}" data-cat="">הכל</span>`+
    CATEGORIES.map(c=>`<span class="chip ${filterCat===c?'on':''}" data-cat="${esc(c)}">${esc(c)}</span>`).join("");
  el.querySelectorAll('.chip').forEach(ch=>ch.onclick=()=>{ filterCat=ch.dataset.cat||null; render(); });
}
function renderList(){
  const area=document.getElementById('listArea'), items=filtered();
  if(!receipts.length){
    area.innerHTML=`<div class="list"><div class="empty"><div class="e-ico">📥</div><div class="e-t">עדיין אין קבלות</div><div>העלו קבלה ראשונה — ה-AI יסדר אותה כאן.</div></div></div>`;
    return;
  }
  if(!items.length){
    area.innerHTML=`<div class="list"><div class="empty"><div class="e-ico">🔍</div><div class="e-t">אין תוצאות</div></div></div>`;
    return;
  }
  area.innerHTML=`<div class="list">${items.map(rowHTML).join("")}</div>`;
  bindRows();
}
function rowHTML(r){
  const isOpen=r.id===expandedId;
  const thumb=r.thumb?`<img class="thumb" src="${r.thumb}" alt="">`:
    `<div class="thumb ph">${r.status==="processing"?'<div class=spin></div>':'📄'}</div>`;
  const head=`<div class="item-head" data-id="${r.id}">${thumb}
    <div class="meta"><div class="v">${esc(r.vendor||'—')}</div>
    <div class="d">${esc(r.date||'תאריך לא ידוע')}</div>
    ${r.category?`<span class="cat">${esc(r.category)}</span>`:''}</div>
    <div class="amt-col"><div class="t">${r.status==="processing"?'· · ·':money(r.total,r.currency)}</div>
    ${r.vat?`<div class="vat">מע״מ ${r.vat.toFixed(2)}</div>`:''}</div></div>`;
  let detail="";
  if(isOpen) detail=(r.id===editingId)?editHTML(r):viewHTML(r);
  return `<div class="item">${head}${detail}</div>`;
}
function viewHTML(r){
  const line=(l,v)=>`<div class="fld"><label>${l}</label><div style="font-family:var(--mono);font-size:14px;padding:2px 0">${esc(v??'—')}</div></div>`;
  return `<div class="detail"><div class="grid">
    ${line('ספק',r.vendor)}${line('תאריך',r.date)}${line('קטגוריה',r.category)}${line('אמצעי תשלום',r.payment_method)}
    ${line('לפני מע״מ',r.subtotal!=null?money(r.subtotal,r.currency):null)}${line('מע״מ',r.vat!=null?money(r.vat,r.currency):null)}
    ${line('סה״כ',r.total!=null?money(r.total,r.currency):null)}${line('מטבע',r.currency)}
    ${r._err?`<div class="fld" style="grid-column:1/-1"><label>שגיאה</label><div style="font-size:12px;color:var(--stamp)">${esc(r._err)}</div></div>`:''}
  </div><div class="actions"><button class="btn btn-green btn-sm" data-edit="${r.id}">עריכה</button>
  <button class="btn-ghost" data-del="${r.id}">מחיקה</button></div></div>`;
}
function editHTML(r){
  const opt=CATEGORIES.map(c=>`<option ${c===r.category?'selected':''}>${esc(c)}</option>`).join("");
  return `<div class="detail"><div class="grid">
    <div class="fld"><label>ספק</label><input id="e_vendor" value="${esc(r.vendor)}"></div>
    <div class="fld mono"><label>תאריך</label><input id="e_date" value="${esc(r.date||'')}"></div>
    <div class="fld"><label>קטגוריה</label><select id="e_category">${opt}</select></div>
    <div class="fld"><label>אמצעי תשלום</label><input id="e_pay" value="${esc(r.payment_method||'')}"></div>
    <div class="fld mono"><label>לפני מע״מ</label><input id="e_sub" value="${r.subtotal??''}"></div>
    <div class="fld mono"><label>מע״מ</label><input id="e_vat" value="${r.vat??''}"></div>
    <div class="fld mono"><label>סה״כ</label><input id="e_total" value="${r.total??''}"></div>
    <div class="fld mono"><label>מטבע</label><input id="e_cur" value="${esc(r.currency||'ILS')}"></div>
  </div><div class="actions">
    <button class="btn btn-green btn-sm" data-save="${r.id}">שמירה</button>
    <button class="btn btn-sm" data-cancel="${r.id}">ביטול</button>
  </div></div>`;
}
function bindRows(){
  document.querySelectorAll('.item-head').forEach(h=>h.onclick=()=>{
    const id=h.dataset.id; expandedId=(expandedId===id?null:id); editingId=null; render();
  });
  document.querySelectorAll('[data-edit]').forEach(b=>b.onclick=e=>{e.stopPropagation();editingId=b.dataset.edit;render();});
  document.querySelectorAll('[data-cancel]').forEach(b=>b.onclick=e=>{e.stopPropagation();editingId=null;render();});
  document.querySelectorAll('[data-del]').forEach(b=>b.onclick=e=>{
    e.stopPropagation();
    receipts=receipts.filter(x=>x.id!==b.dataset.del);
    expandedId=null; persist(); render(); toast("נמחק");
  });
  document.querySelectorAll('[data-save]').forEach(b=>b.onclick=e=>{
    e.stopPropagation();
    const r=receipts.find(x=>x.id===b.dataset.save); if(!r) return;
    r.vendor=document.getElementById('e_vendor').value.trim()||r.vendor;
    r.date=document.getElementById('e_date').value.trim()||null;
    r.category=document.getElementById('e_category').value;
    r.payment_method=document.getElementById('e_pay').value.trim()||null;
    r.subtotal=numOrNull(document.getElementById('e_sub').value);
    r.vat=numOrNull(document.getElementById('e_vat').value);
    r.total=numOrNull(document.getElementById('e_total').value);
    r.currency=document.getElementById('e_cur').value.trim()||'ILS';
    r.status="done"; editingId=null; persist(); render(); toast("נשמר");
  });
}
function render(){ renderTally(); renderChips(); renderList(); }

/* ---------- CSV ---------- */
function exportCSV(){
  if(!receipts.length){ toast("אין קבלות לייצוא"); return; }
  const head=["ספק","תאריך","קטגוריה","מטבע","לפני מעמ","מעמ","סהכ","אמצעי תשלום"];
  const rows=receipts.map(r=>[r.vendor,r.date,r.category,r.currency,r.subtotal,r.vat,r.total,r.payment_method]
    .map(v=>`"${(v??'').toString().replace(/"/g,'""')}"`).join(","));
  const csv="\uFEFF"+head.join(",")+"\n"+rows.join("\n");
  const a=Object.assign(document.createElement('a'),{href:URL.createObjectURL(new Blob([csv],{type:"text/csv;charset=utf-8"})),download:"pinkas.csv"});
  a.click(); URL.revokeObjectURL(a.href); toast("יוצא ✓");
}

/* ---------- wiring ---------- */
const drop=document.getElementById('drop'), fileInput=document.getElementById('file');
drop.onclick=()=>fileInput.click();
fileInput.onchange=e=>{ if(e.target.files.length){ handleFiles([...e.target.files]); fileInput.value=""; } };
['dragenter','dragover'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.add('drag');}));
['dragleave','drop'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.remove('drag');}));
drop.addEventListener('drop',e=>{ if(e.dataTransfer.files.length) handleFiles([...e.dataTransfer.files]); });
document.getElementById('search').oninput=e=>{ searchText=e.target.value; renderList(); };
document.getElementById('exportBtn').onclick=exportCSV;

/* ---------- init ---------- */
receipts = loadData();
loadKey();
render();
</script>
</body>
</html>
